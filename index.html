<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Website</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; color: #333; }

    section {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px 20px;
      text-align: center;
    }

    .hero { background: #2c3e50; color: white; }
    .about { background: #f9f9f9; }
    .contact { background: #3498db; color: white; }

    h1 { font-size: 3rem; margin-bottom: 16px; }
    h2 { font-size: 2rem; margin-bottom: 16px; }
    p  { font-size: 1.1rem; max-width: 600px; line-height: 1.6; }
  </style>
</head>
<body>

  <!-- Hero Section -->
  <section class="hero">
    <h1 data-aos="fade-up">Hi, I'm Jane</h1>
    <p data-aos="fade-up" data-aos-delay="200">Welcome to my personal website.</p>
  </section>

  <!-- About Section -->
  <section class="about">
    <h2 data-aos="fade-right">About Me</h2>
    <p data-aos="fade-right" data-aos-delay="200">
      I'm a designer and developer who loves building things on the web.
    </p>
  </section>

  <!-- Contact Section -->
  <section class="contact">
    <h2 data-aos="zoom-in">Get In Touch</h2>
    <p data-aos="zoom-in" data-aos-delay="200">
      Reach me at hello@mysite.com
    </p>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script>AOS.init({ duration: 800, once: true });</script>

</body>
</html>
